<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentir - Iniciar Sesión</title>

    <link rel="stylesheet" href="Login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="background-blur"></div>

    <main class="container">

        <section class="left-panel">

            <div class="logo">
                <img src="/Sentir/Shared/LoginResources/logo-sentir.png" alt="Logo Sentir">
            </div>

            <h1><span style="color:#6C4DF6">Bienvenido de nuevo </span></h1>

              <h3>
                <span style="color:#000000">Entiendo lo que </span>
                <span style="color:#4E2FC7;">sientes</span>
                <span style="color:#000000"> y, </span>
                <br>
                <span style="color:#000000">transforma tu </span>
                <span style="color:#4E2FC7;">bienestar.</span>
                </h3>

        </section>

        <section class="form-panel">

            <div class="form-card">

                <h2>Iniciar Sesión</h2>

                <form id="loginForm">

                    <div class="input-group">
                        <label><span style="color:#000000">Correo electrónico </span></label>
                        <input type="email" required>
                    </div>

                    <div class="input-group">
                        <label><span style="color:#000000">Contraseña </span></label>
                        <input type="password" required>
                    </div>

                    <button type="submit" class="btn">
                        Ingresar
                    </button>

                </form>

                <p class="redirect">
                    ¿No tienes cuenta?
                    <a href="registro.html">Regístrate</a>
                </p>

            </div>

        </section>

    </main>

    <script src="Login.js"></script>

</body>

</html>
