<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
   


    <title>Sentir</title>
</head>
<body>

<div class="container-fluid pantalla-inicio">

    <div class="container"
        <!-- Logo -->
        <div class="logo-container">
            <img src="Recursos/logo-sentir.png" alt="Logo Sentir" class="logo">
        </div>

        <!-- Texto -->
        <div class="text-center mt-3">
            <h4 class="titulo">
                Entiende lo que <span style="color:#4E2FC7;">sientes</span> y,<br> transforma tu <span style="color:#4E2FC7;">bienestar</span>.</br>
            </h4>
        </div>

        <!-- Personajes -->
        <div class="personajes-container">
            <img src="Recursos/personajes.png" alt="Personajes" class="personajes">
        </div>

        <!-- Botones -->
        <div class="d-grid gap-3 mt-4">

            <button class="btn btn-login"  onclick="window.location.href='login.html'">
                Iniciar sesión
            </button>

            <button class="btn btn-crear" onclick="window.location.href='registro.html'">
                Crear cuenta
            </button>
            
            

        </div>

        <!-- Accesibilidad -->
        <div class="text-center mt-4 accesibilidad">
            <i class="fi fi-rr-universal-access"></i> Accesible para todos
        </div>
        
    </div>

</div>
<script src="script.js"></script>

</body>
</html>
